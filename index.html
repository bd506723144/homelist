<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小言的家 · 装修清单</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <div class="header-eyebrow">Home · Collection</div>
    <h1>小言的家 <span>·</span> 装修清单</h1>
    <p class="header-sub">硬装 · 软装 · 小物件<br>每一件都是精挑细选</p>
    <div class="header-divider"></div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('all', this)">全部</button>
    <button class="tab-btn" onclick="switchTab('hard', this)">硬装</button>
    <button class="tab-btn" onclick="switchTab('soft', this)">软装</button>
    <button class="tab-btn" onclick="switchTab('small', this)">小物件</button>
    <button class="tab-btn" onclick="switchTab('aroll', this)">一镜到底</button>

  </nav>

  <main>
    <div id="all" class="section active"></div>
    <div id="hard" class="section"></div>
    <div id="soft" class="section"></div>
    <div id="small" class="section"></div>
    <div id="aroll" class="section"></div>
  </main>

  <!-- 二维码遮罩 -->
  <div class="qr-modal" id="qrModal" onclick="closeModal()">
    <div class="qr-modal-inner" onclick="event.stopPropagation()">
      <img src="wechat-qr.jpg" alt="加小言微信">
      <p class="qr-modal-tip">点击任意处关闭</p>
    </div>
  </div>

  <div class="bottom-cta" onclick="openModal()">
    <strong>装修交流可以加小言 清单完善中</strong>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
